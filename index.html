<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Assistente de Reparação de Portáteis</title>
<style>
 :root{
 --bg:#0f172a; --panel:#111827; --card:#0b1220;
 --text:#e5e7eb; --muted:#9ca3af; --primary:#3b82f6;
 --accent:#22c55e; --warn:#f59e0b; --danger:#ef4444;
 }
 *{box-sizing:border-box}
 body{margin:0; background:var(--bg); color:var(--text);
 font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial; line-height:1.5}
 header{padding:16px 20px; border-bottom:1px solid #1f2937; background:#0e1628; position:sticky; top:0; z-index:3}
 header h1{margin:0; font-size:1.2rem}
 main{display:grid; gap:16px; padding:16px; grid-template-columns:1fr; max-width:1200px; margin:0 auto}
 @media(min-width:900px){ main{grid-template-columns:1.1fr 1fr} }
 section{background:var(--panel); border:1px solid #1f2937; border-radius:12px; overflow:hidden}
 .section-header{padding:14px 16px; border-bottom:1px solid #1f2937; background:#0c1323;
 display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap}
 .section-header h2{margin:0; font-size:1rem}
 .badge{font-size:.75rem; color:#cbd5e1; background:#0b1220; border:1px solid #1f2937; padding:4px 8px; border-radius:999px}
 .content{padding:16px}
 .question{font-size:1.05rem; margin-bottom:12px; font-weight:600}
 .options{display:flex; flex-wrap:wrap; gap:10px}
 .btn{background:#0b1220; color:var(--text); border:1px solid #1f2937; padding:10px 14px; border-radius:10px; cursor:pointer; transition:.15s; font-size:.95rem}
 .btn:hover{transform:translateY(-1px); border-color:#2b3b56}
 .btn-ghost{background:transparent; border-color:#2b3b56}
 .btn-primary{background:linear-gradient(180deg,#1f3b77,#122246); border-color:#25407a}
 .btn-danger{background:#3a0c12; border-color:#7a1b26}
 .btn-success{background:#0d3a21; border-color:#1f7a49}
 .small{font-size:.85rem} .muted{color:#9ca3af}
 .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
 .progress{background:#0b1220; border:1px solid #1f2937; border-radius:10px; overflow:hidden; height:10px; flex:1; min-width:140px}
 .progress > div{height:100%; background:linear-gradient(90deg,#3b82f6,#22c55e); width:0%; transition:width .25s}
 .history{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
 .chip{background:#0b1220; border:1px solid #1f2937; padding:6px 10px; border-radius:999px; font-size:.85rem}
 .chip.omitida{opacity:.7; border-style:dashed}
 .divider{height:1px; background:#1f2937; margin:12px 0}
 .placeholder{color:#9ca3af88; font-style:italic; padding:12px 0}
 .answers{display:flex; flex-direction:column; gap:12px}
 .card{background:var(--card); border:1px solid #1f2937; border-radius:12px; padding:14px}
 .status{font-size:.8rem; padding:4px 8px; border-radius:999px; border:1px solid #1f2937}
 .status-soft{color:#c0c8d8}
 .status-final{background:#082f17; color:#86efac; border-color:#155f3a}
 .status-warning{background:#2b220a; color:#facc15; border-color:#4a3a0b}
 .bar{background:#0b1220; border:1px solid #1f2937; height:8px; border-radius:10px; overflow:hidden; margin-top:6px}
 .bar > div{height:100%; background:linear-gradient(90deg,#2563eb,#22c55e); width:0%; transition:width .3s}
 .spinner{width:18px; height:18px; border:3px solid #2b3b56; border-top-color:#60a5fa; border-radius:50%; animation:spin 1s linear infinite; display:inline-block; vertical-align:middle; margin-right:8px}
 @keyframes spin{to{transform:rotate(360deg)}}
 .tips{color:#cbd5e1; font-size:.95rem; margin-top:8px}
 .error-banner{background:#3a0c12; border:1px solid #7a1b26; color:#fecaca; padding:10px 12px; border-radius:10px; display:none; margin:10px 16px}
</style>
</head>
<body>
<header>
 <h1>Assistente de Reparação de Portáteis - Diagnóstico Interactivo</h1>
</header>
<div id="error-banner" class="error-banner"></div>
<main>
 <!-- PERGUNTAS -->
 <section aria-labelledby="perguntas-title">
   <div class="section-header">
     <h2 id="perguntas-title">Perguntas</h2>
     <div class="row">
       <span class="small muted" id="counter">Pergunta 0 de 30</span>
     </div>
   </div>
   <div class="content">
     <div class="question" id="question-text">A carregar…</div>
     <div class="options" id="options"></div>
     <div class="row" style="margin-top:8px">
       <div class="small muted">Progresso</div>
       <div class="progress"><div id="progress-bar"></div></div>
       <button class="btn btn-ghost small" id="reset-btn" >Reiniciar</button>
     </div>
     <div class="history" id="history"></div>
     <div class="divider"></div>
     <div id="limit-actions" class="row" style="display:none">
       <span class="small muted">Atingiste o limite de 30 perguntas.</span>
       <button class="btn btn-primary" id="continue-btn">Continuar (ilimitado)</button>
       <button class="btn btn-danger" id="limit-reset-btn">Reiniciar assistente</button>
     </div>
   </div>
 </section>
 <!--RESPOSTAS-->
 <section aria-labelledby="respostas-title">
   <div class="section-header">
     <h2 id="respostas-title">Respostas</h2>
     <div class="small muted">Estado do diagnóstico</div>
   </div>
   <div class="content">
     <div id="answers-placeholder" class="placeholder">ainda não há respostas</div>
     <div id="loading" class="small muted" style="display:none">
       <span class="spinner" aria-hidden="true"></span> a gerar…
     </div>
     <div class="answers" id="answers"></div>
     <div id="solution-actions" class="row" style="display:none; margin-top:12px">
       <button class="btn btn-success" id="worked-btn">Sim, funcionou ✅</button>
       <button class="btn btn-ghost" id="not-worked-btn">Não, continuar</button>
       <button class="btn btn-danger" id="solution-reset-btn">Reiniciar assistente</button>
     </div>
   </div>
 </section>
</main>

<script>
/*Banner de erros, evita bucle de carregamento*/
(function(){
  var banner = document.getElementById('error-banner');
  window.addEventListener('error', function(ev){
    if (banner){
      banner.style.display = 'block';
      banner.textContent = 'Erro de script: ' + (ev && ev.message ? ev.message : 'desconhecido');
    }
  });
})();
/*Utilitários*/
function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); } // delay para mostrar "a gerar"
function el(id){ return document.getElementById(id); }
function setProgress(actual, max){ // contador de perguntas
  var percent = Math.min(100, Math.round((actual / max) * 100));
  var bar = el('progress-bar'); if (bar) bar.style.width = percent + '%';             
  var ctr = el('counter'); if (ctr) ctr.textContent = 'Pergunta ' + actual + ' de ' + max; 
}
function hashAnswers(answers){ // evita erros graficos
  try { return btoa(unescape(encodeURIComponent(JSON.stringify(answers)))).slice(0, 12); }
  catch(e){ return Math.random().toString(36).slice(2,14); }
}
// Configuração do botão OMISSÃO
var ALWAYS_ALLOW_OMIT = true;  // mostra "omitir pergunta" em todas as questões
var OMIT_CONSUMES_LIMIT = false; // omitir não consome o limite 
var MANDATORY_IDS = ['symptom_main']; // perguntas que não podem ser omitidas
/* ===== Perguntas (portáteis) ===== */
var QUESTIONS = [
  { id:'symptom_main', first:true,
    text:'Qual destas opções descreve melhor o que acontece com o teu portátil?',
    options:[
      {key:'nao_liga', label:'Não liga'},
      {key:'liga_sem_imagem', label:'Liga mas não dá imagem'},
      {key:'liga_bloqueia', label:'Liga mas bloqueia/congela'},
      {key:'reinicia', label:'Reinicia sozinho com frequência'},
      {key:'funciona_exc_componentes', label:'Funciona bem excepto alguns componentes'}
    ]
  },
  /* Energia e carregamento */
  { id:'ac_led', text:'Ao ligar o carregador, o LED de carga acende ou indica que está a carregar?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'},{key:'intermitente', label:'Pisca/Intermitente'}]
  },
  { id:'ac_original', text:'O carregador é original/compatível e da voltagem correta?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'},{key:'ns', label:'Não sei'}]
  },
  { id:'porta_carga_folga', text:'A ficha/porta de carga tem folga ou falha quando mexes no cabo?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'}]
  },
  { id:'funciona_com_bateria', text:'Se desligares da tomada, o portátil mantém-se ligado?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'},{key:'sem_bat', label:'Sem bateria/Não aplicável'}]
  },
  { id:'bateria_inchada', text:'Notas a bateria inchada ou aquecimento anormal durante a carga?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'},{key:'ns', label:'Não sei'}]
  },
  { id:'power_led_fans', text:'Ao carregar no botão de ligar, acendem LEDs ou ouves a ventoinha?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'},{key:'ns', label:'Não sei'}]
  },
  { id:'beeps', text:'O portátil emite sinais sonoros (bips) ao arrancar?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'},{key:'ns', label:'Não sei'}]
  },
  /* Ecrã / vídeo */
  { id:'externo_imagem', text:'Se ligares a um monitor/TV externo (HDMI/USB‑C), aparece imagem aí?',
    options:[{key:'sim', label:'Sim, no externo aparece'},{key:'nao', label:'Não, também não'},{key:'nao_test', label:'Ainda não testei'}]
  },
  { id:'brilho_baixo', text:'O ecrã interno parece muito escuro (imagem muito ténue com luz)?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'}]
  },
  { id:'mexe_tampa', text:'Muda algo (pisca/volta a imagem) quando movimentas a tampa/dobradiças?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'}]
  },
  /* Sistema e estabilidade */
  { id:'congela', text:'Durante o uso, o rato/teclado deixam de responder (bloqueia)?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'}]
  },
  { id:'em_jogos', text:'Acontece sobretudo em jogos ou tarefas gráficas intensivas?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'},{key:'na', label:'Não aplicável'}]
  },
  { id:'temps_altas', text:'Reparaste em temperaturas altas/ventoinhas muito ruidosas antes dos problemas?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'},{key:'ns', label:'Não sei'}]
  },
  { id:'recentes_alteracoes', text:'Instalaste hardware novo ou actualizaste drivers/SO recentemente?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'}]
  },
  { id:'acesso_bios', text:'Consegues entrar na BIOS/UEFI?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'},{key:'nao_chega', label:'Não chega a esse ponto'}]
  },
  { id:'loop_arranque', text:'Fica preso num ciclo de arranque/actualização do Windows?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'}]
  },
  { id:'ruidos_disco', text:'Ouvem‑se cliques do disco ou actividade anormal e contínua?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'},{key:'ssd', label:'Tenho SSD'}]
  },
  /* Periféricos e danos */
  { id:'usb_desconectar', text:'Se desconectares todos os periféricos USB, muda algo?',
    options:[{key:'melhora', label:'Melhora/Arranca'},{key:'igual', label:'Fica igual'},{key:'nao_test', label:'Não testei'}]
  },
  { id:'derrame', text:'Houve contacto com líquido (água, café, etc.)?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'}]
  },
  { id:'cheiro_queimado', text:'Sentes cheiro a queimado ou viste faíscas/fumo?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'}]
  },
  { id:'queda_golpe', text:'Levou alguma queda/impacto recentemente?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'}]
  },
  /* “Funciona excepto…” */
  { id:'teclado_touchpad', text:'O teclado ou o touchpad deixam de funcionar às vezes?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'},{key:'na', label:'Não aplicável'}]
  },
  { id:'wifi_camera', text:'Há problemas com Wi‑Fi/câmara/microfone especificamente?',
    options:[{key:'sim', label:'Sim'},{key:'nao', label:'Não'},{key:'na', label:'Não aplicável'}]
  }
];
/*Hipóteses*/
var HYPOTHESES = [
  { id:'ac_adapter_bad',
    name:'Carregador incompatível/avariado',
    primary:['nao_liga','reinicia'],
    evidence:{ ac_led:{nao:+3, intermitente:+2}, ac_original:{nao:+2, ns:+1}, funciona_com_bateria:{sim:+1, nao:+2} },
    fix:[
      'Testa com carregador original/compatível (tensão e amperagem corretas).',
      'Verifica cabo e ficha por cortes/torções.',
      'Usa outra tomada/regleta fiável.'
    ], severity:'média'
  },
  { id:'dc_jack_fault',
    name:'Porta de carga (DC‑jack) com mau contacto/danificada',
    primary:['nao_liga','reinicia'],
    evidence:{ porta_carga_folga:{sim:+3}, ac_led:{intermitente:+2, nao:+1}, queda_golpe:{sim:+1} },
    fix:[
      'Verifica folgas na porta de carga com o portátil desligado.',
      'Se o LED falha ao mexer no cabo, requer reparação/substituição do DC‑jack.'
    ], severity:'média'
  },
  { id:'battery_bad_swollen',
    name:'Bateria degradada/inflada ou sem capacidade',
    primary:['nao_liga','reinicia','liga_bloqueia'],
    evidence:{ funciona_com_bateria:{nao:+3}, bateria_inchada:{sim:+3, ns:+1}, ac_led:{sim:+1} },
    fix:[
      'Desliga/retira a bateria (se possível) e testa só com o carregador.',
      'Substitui a bateria se inchada ou com ciclos esgotados.'
    ], severity:'alta'
  },
  { id:'power_button_cable',
    name:'Botão de ligar/cabo flat com falha',
    primary:['nao_liga'],
    evidence:{ power_led_fans:{nao:+3}, ac_led:{sim:+1} },
    fix:[ 'Pode requerer verificação do cabo/placa do botão de energia.' ],
    severity:'média'
  },
  { id:'mb_vrm_spike',
    name:'Placa‑mãe/VRM danificada (pico de tensão ou curto)',
    primary:['nao_liga','reinicia'],
    evidence:{ cheiro_queimado:{sim:+3}, derrame:{sim:+2}, queda_golpe:{sim:+1}, ac_led:{nao:+1} },
    fix:[
      'Desconecta imediatamente; inspeção técnica recomendada.',
      'Pode exigir reparação da placa ou substituição.'
    ], severity:'alta'
  },
  { id:'overheat_cpu_gpu',
    name:'Sobreaquecimento (CPU/GPU) - pasta/ventoinha/poeira',
    primary:['reinicia','liga_bloqueia'],
    evidence:{ temps_altas:{sim:+3}, em_jogos:{sim:+2}, congela:{sim:+2} },
    fix:[
      'Limpa poeiras; confirma que a ventoinha roda.',
      'Troca a pasta térmica se antiga.',
      'Monitoriza temperaturas na BIOS/diagnóstico.'
    ], severity:'alta'
  },
  { id:'ram_issue',
    name:'Memória RAM mal encaixada/defeituosa',
    primary:['liga_sem_imagem','reinicia','liga_bloqueia'],
    evidence:{ beeps:{sim:+2}, congela:{sim:+2}, acesso_bios:{nao_chega:+1} },
    fix:[
      'Retira e volta a colocar os módulos; testa um de cada vez.',
      'Limpa contactos; muda de slot se existir.'
    ], severity:'média'
  },
  { id:'storage_fail',
    name:'Unidade (HDD/SSD) com falhas',
    primary:['liga_bloqueia','reinicia'],
    evidence:{ ruidos_disco:{sim:+3}, loop_arranque:{sim:+2}, acesso_bios:{sim:+1} },
    fix:[
      'Se for HDD com “cliques”, faz cópia urgente e substitui.',
      'Verifica SMART; confirma encaixe do SSD.',
      'Repara/reinstala o sistema se necessário.'
    ], severity:'alta'
  },
  { id:'lcd_backlight',
    name:'Retroiluminação do ecrã (backlight) avariada',
    primary:['liga_sem_imagem'],
    evidence:{ brilho_baixo:{sim:+3}, externo_imagem:{sim:+2}, mexe_tampa:{nao:+1} },
    fix:[
      'Testa com lanterna: se vês imagem ténue, provável falha de backlight.',
      'Pode exigir substituição do painel/placa de retroiluminação.'
    ], severity:'média'
  },
  { id:'lcd_flat_cable',
    name:'Cabo flat do ecrã (dobradiça) com mau contacto',
    primary:['liga_sem_imagem'],
    evidence:{ mexe_tampa:{sim:+3}, externo_imagem:{sim:+2}, queda_golpe:{sim:+1} },
    fix:[
      'Se ao mexer na tampa a imagem volta/pisca, forte indício de cabo flat.',
      'Requer re‑encaixe ou substituição do cabo.'
    ], severity:'média'
  },
  { id:'gpu_problem',
    name:'GPU (integrada/dedicada) com problema',
    primary:['liga_sem_imagem','liga_bloqueia','reinicia'],
    evidence:{ externo_imagem:{nao:+2}, em_jogos:{sim:+2}, congela:{sim:+1}, beeps:{sim:+1} },
    fix:[
      'Actualiza/reinstala drivers; testa em Modo de Segurança.',
      'Se também não há imagem externa, provável falha na GPU/placa.'
    ], severity:'média'
  },
  { id:'os_corruption',
    name:'Sistema operativo/driver corrompido',
    primary:['reinicia','liga_bloqueia','funciona_exc_componentes'],
    evidence:{ recentes_alteracoes:{sim:+2}, loop_arranque:{sim:+2}, acesso_bios:{sim:+1} },
    fix:[
      'Arranque em Modo de Segurança; reverte/reinstala drivers problemáticos.',
      'Usa Restauro do Sistema ou Reparação de Arranque.',
      'Como último recurso, reinstala o SO.'
    ], severity:'média'
  },
  { id:'usb_short',
    name:'Periférico USB/porta com curto',
    primary:['nao_liga','reinicia','liga_bloqueia'],
    evidence:{ usb_desconectar:{melhora:+3, igual:-1} },
    fix:[
      'Arranca com tudo desligado excepto teclado/ rato (se externos).',
      'Liga um a um até encontrares o culpado; verifica portas.'
    ], severity:'baixa'
  },
  { id:'bios_cmos',
    name:'BIOS/UEFI mal configurada ou bateria CMOS fraca',
    primary:['liga_sem_imagem','reinicia'],
    evidence:{ acesso_bios:{nao_chega:+2, nao:+1}, recentes_alteracoes:{sim:+1} },
    fix:[
      'Faz Clear CMOS (consultar manual).',
      'Actualiza a BIOS para versão estável.',
      'Repõe valores por defeito e volta a testar.'
    ], severity:'média'
  },
  { id:'kb_tp_failure',
    name:'Teclado/Touchpad com avaria intermitente',
    primary:['funciona_exc_componentes','liga_bloqueia'],
    evidence:{ teclado_touchpad:{sim:+3}, derrame:{sim:+2} },
    fix:[
      'Verifica cabo flat do teclado/touchpad.',
      'Após derrame, frequentemente requer substituição.'
    ], severity:'baixa'
  },
  { id:'wifi_cam_issue',
    name:'Módulos de Wi‑Fi/Câmara/Microfone com problema',
    primary:['funciona_exc_componentes'],
    evidence:{ wifi_camera:{sim:+3}, recentes_alteracoes:{sim:+1} },
    fix:[
      'Reinstala drivers; testa activação por teclas Fn.',
      'Pode ser falha do módulo/flat cable; considerar substituição.'
    ], severity:'baixa'
  }
];
/*Parâmetros de convergência= */
var STRICT_PRIMARY = true; // restringe às hipóteses do sintoma escolhido
var TOP_KEEP_EARLY = 6;    // top N antes de 5 perguntas
var TOP_KEEP_LATE = 4;     // top N após 5 perguntas (força ≤ 4)
var MARGIN_KEEP = 2;       // mantém hipóteses a <= 2 pts do máximo
var ELIMINATION_THRESHOLD = -2; // elimina se score < -2
/*Estado*/
var STATE = {
  asked: [], answers: {}, maxQuestions: 30, unlimited: false, finished: false,
  candidates: (function(){ var arr=[]; for (var i=0;i<HYPOTHESES.length;i++){ var h=HYPOTHESES[i], c={}; for (var k in h) c[k]=h[k]; c.score=0; c.eliminated=false; arr.push(c); } return arr; })(),
  lastRenderHash: ''
};
/*compatibilidade*/
function getFirstQuestion(){
  for (var i=0;i<QUESTIONS.length;i++){ if (QUESTIONS[i].first) return QUESTIONS[i]; }
  return QUESTIONS[0];
}
function unansweredQuestions(){
  var askedIds = {}; for (var i=0;i<STATE.asked.length;i++){ askedIds[STATE.asked[i].id]=true; }
  var out=[]; for (var j=0;j<QUESTIONS.length;j++){ if (!askedIds[QUESTIONS[j].id]) out.push(QUESTIONS[j]); }
  return out;
}
/*Regras duras (eliminação/impulsos) para convergência*/
function applyHardConstraints(candidates, answers){
  var main = answers['symptom_main'];
  // Sintoma: não liga
  if (main === 'nao_liga'){
    if (answers['power_led_fans'] === 'nao'){
      for (var i=0;i<candidates.length;i++){
        var id = candidates[i].id;
        if (id==='storage_fail'
         || id==='os_corruption'
         || id==='lcd_backlight'
         || id==='lcd_flat_cable'
         || id==='gpu_problem'){
          candidates[i].eliminated = true;
        }
      }
    }
  }
  // Sintoma: liga sem imagem
  if (main === 'liga_sem_imagem'){
    if (answers['externo_imagem'] === 'sim'){
      for (var j=0;j<candidates.length;j++){
        var idj = candidates[j].id;
        if (idj==='gpu_problem'
         || idj==='os_corruption'){ candidates[j].eliminated = true; }
        if (idj==='lcd_backlight'
         || idj==='lcd_flat_cable'){ candidates[j].score += 3; }
      }
    }
    if (answers['mexe_tampa'] === 'sim'){
      for (var k=0;k<candidates.length;k++){
        if (candidates[k].id==='lcd_flat_cable'){ candidates[k].score += 4; }
        if (candidates[k].id==='lcd_backlight'){ candidates[k].score += 1; }
      }
    }
    if (answers['brilho_baixo'] === 'sim'){
      for (var m=0;m<candidates.length;m++){
        if (candidates[m].id==='lcd_backlight'){ candidates[m].score += 4; }
      }
    }
  }
  // Sintoma: bloqueia ou reinicia
  if (main === 'liga_bloqueia'
   || main === 'reinicia'){
    if (answers['temps_altas'] === 'sim'){
      for (var a=0;a<candidates.length;a++){
        if (candidates[a].id==='overheat_cpu_gpu'){ candidates[a].score += 4; }
      }
    }
    if (answers['em_jogos'] === 'sim'){
      for (var b=0;b<candidates.length;b++){
        var idb = candidates[b].id;
        if (idb==='gpu_problem'){ candidates[b].score += 3; }
        if (idb==='overheat_cpu_gpu'){ candidates[b].score += 2; }
      }
    }
    if (answers['ruidos_disco'] === 'sim'){
      for (var c=0;c<candidates.length;c++){
        var idc = candidates[c].id;
        if (idc==='storage_fail'){ candidates[c].score += 4; }
        if (idc==='lcd_backlight'
         || idc==='lcd_flat_cable'
         || idc==='gpu_problem'){ candidates[c].eliminated = true; }
      }
    }
  }
  // Indícios independentes
  if (answers['bateria_inchada'] === 'sim'){
    for (var d=0; d<candidates.length; d++){
      if (candidates[d].id==='battery_bad_swollen'){ candidates[d].score += 5; }
    }
  }
  if (answers['porta_carga_folga'] === 'sim'){
    for (var e=0; e<candidates.length; e++){
      if (candidates[e].id==='dc_jack_fault'){ candidates[e].score += 4; }
    }
  }
  if (answers['usb_desconectar'] === 'melhora'){
    for (var f=0; f<candidates.length; f++){
      if (candidates[f].id==='usb_short'){ candidates[f].score += 4; }
      else { candidates[f].score -= 1; }
    }
  }
  if (answers['cheiro_queimado'] === 'sim'
   || answers['derrame'] === 'sim'
   || answers['queda_golpe'] === 'sim'){
    for (var g=0; g<candidates.length; g++){
      if (candidates[g].id==='mb_vrm_spike'){ candidates[g].score += 3; }
    }
  }
  // Contradições gerais
  if (answers['acesso_bios'] === 'sim'){
    for (var h=0; h<candidates.length; h++){
      var idh = candidates[h].id;
      if (idh==='lcd_backlight'
       || idh==='lcd_flat_cable'){ candidates[h].score -= 2; }
    }
  }
  return candidates;
}
/*Escolha da próxima pergunta*/
function pickNextQuestion(){
  var first = getFirstQuestion();
  if (!STATE.answers[first.id]) return first;
  var remaining = unansweredQuestions(); if (!remaining.length) return null;
  var best=null, bestScore=-Infinity;
  for (var i=0;i<remaining.length;i++){
    var q = remaining[i], dist = {}, total = 0;
    for (var j=0;j<STATE.candidates.length;j++){
      var c = STATE.candidates[j]; if (c.eliminated) continue;
      var ev = (c.evidence && c.evidence[q.id]) ? c.evidence[q.id] : {};
      var keys = []; for (var kk in ev){ keys.push(kk); }
      var bestAns=null, bestW=-Infinity;
      for (var k=0;k<keys.length;k++){ var key = keys[k], w = ev[key]; if (w>bestW){ bestW=w; bestAns=key; } }
      var chosen = bestAns || 'na'; dist[chosen]=(dist[chosen]||0)+1; total++;
    }
    if (total===0) continue;
    var entropy=0; for (var key in dist){ var p = dist[key]/total; entropy += -p * Math.log(p) / Math.log(2); }
    if (entropy > bestScore){ bestScore=entropy; best=q; }
  }
  return best;
}
/*Puntuação*/
function updateCandidatesScores(){
  var answers = STATE.answers;
  //Deep copy das hipóteses
  var candidates = [];
  for (var i=0;i<HYPOTHESES.length;i++){
    var h = HYPOTHESES[i], c = {};
    for (var k in h) c[k]=h[k];
    c.score=0; c.eliminated=false;
    candidates.push(c);
  }
  //Filtro estrito pelo sintoma principal
  var main = answers['symptom_main'];
  if (main && STRICT_PRIMARY){
    var filtered = [];
    for (i=0;i<candidates.length;i++){
      if (candidates[i].primary && candidates[i].primary.indexOf(main)!==-1) filtered.push(candidates[i]);
    }
    candidates = filtered;
  } else if (main){
    for (i=0;i<candidates.length;i++){
      if (candidates[i].primary && candidates[i].primary.indexOf(main)!==-1) candidates[i].score += 3;
      else candidates[i].score -= 2;
    }
  }
  //Pontuação por evidências
  for (var qid in answers){
    var ans = answers[qid];
    for (i=0;i<candidates.length;i++){
      var ev = candidates[i].evidence ? candidates[i].evidence[qid] : null;
      if (!ev) continue;
      var w = ev[ans];
      if (typeof w === 'number') candidates[i].score += w;
    }
  }
  //Aplicar regras duras (eliminação e reforço)
  candidates = applyHardConstraints(candidates, answers);
  // Eliminar por contradição forte
  for (i=0;i<candidates.length;i++){
    if (candidates[i].score < ELIMINATION_THRESHOLD) candidates[i].eliminated = true;
  }
  //Filtragem de hipóteses após 5 perguntas.
  var vivos = []; for (i=0;i<candidates.length;i++){ if (!candidates[i].eliminated) vivos.push(candidates[i]); }
  vivos.sort(function(a,b){ return b.score - a.score; });
  if (vivos.length){
    var maxScore = vivos[0].score;
    var askedCount = STATE.asked.length;
    var topKeep = askedCount >= 5 ? TOP_KEEP_LATE : TOP_KEEP_EARLY;
    for (i=0;i<vivos.length;i++){
      var cnd = vivos[i];
      var keepByTop = i < topKeep;
      var keepByMargin = (maxScore - cnd.score) <= MARGIN_KEEP;
      if (!keepByTop && !keepByMargin){
        cnd.eliminated = true;
      }
    }
  }
  //Ordenar e guardar
  candidates.sort(function(a,b){
    if (a.eliminated !== b.eliminated) return a.eliminated ? 1 : -1;
    return b.score - a.score;
  });
  STATE.candidates = candidates;
  updateHypCount(); //mantém contador visível
}
function remainingHypotheses(){
  var rem=[]; for (var i=0;i<STATE.candidates.length;i++){ if (!STATE.candidates[i].eliminated) rem.push(STATE.candidates[i]); }
  return rem;
}
function shouldShowAnswers(){ return remainingHypotheses().length <= 4; }
function isUniqueSolution(){
  var rem = remainingHypotheses();
  if (rem.length === 1) return true;
  if (!rem.length) return false;
  var top = rem[0], second = rem[1] || {score:0};
  return (top.score >= 4 && (top.score - second.score) >= 2);
}
function updateHypCount(){
  var cnt = remainingHypotheses().length;
  var hc = el('hyp-count'); if (hc) hc.textContent = 'Hipóteses: ' + cnt + (cnt<=4 ? ' (resposta disponível)' : '');
}
/*Renderização*/
function renderQuestion(){
  try{
    if (STATE.finished){ el('question-text').textContent='Diagnóstico concluído.'; el('options').innerHTML=''; return; }
    var limit = el('limit-actions'); 
    if (STATE.asked.length >= STATE.maxQuestions && !STATE.unlimited){
      if (limit) limit.style.display = 'flex'; 
      el('question-text').textContent = 'Atingiste o limite de 30 perguntas.';
      el('options').innerHTML = ''; return;
    } else { if (limit) limit.style.display='none'; } 

    var q = pickNextQuestion();
    if (!q){ el('question-text').textContent='Sem mais perguntas úteis. Revê as respostas ou reinicia.'; el('options').innerHTML=''; return; }

    el('question-text').textContent = q.text;
    el('options').innerHTML = '';

    //Botões das opções normais
    for (var i=0;i<q.options.length;i++){
      var opt = q.options[i];
      var btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = opt.label;
      btn.addEventListener('click', (function(qq,oo){ return function(){ onAnswer(qq, oo); }; })(q,opt));
      el('options').appendChild(btn);
    }

    //Botão para omitir pergunta
    if (ALWAYS_ALLOW_OMIT && MANDATORY_IDS.indexOf(q.id) === -1) {
      var omitBtn = document.createElement('button');
      omitBtn.id = 'omit-btn';
      omitBtn.className = 'btn btn-ghost';
      omitBtn.textContent = 'Omitir pergunta';
      omitBtn.title = 'Só se não entendeste o que a pergunta queria dizer';
      omitBtn.addEventListener('click', function() {
        onAnswer(q, { key: 'omitida', label: 'Omitida' });
      });
      el('options').appendChild(omitBtn);
    }

    setProgress(Math.min(STATE.asked.length, STATE.maxQuestions), STATE.maxQuestions);
  } catch(e){
    var banner = el('error-banner'); if (banner){
      banner.style.display='block'; banner.textContent = 'Erro ao renderizar pergunta: ' + e.message;
    }
  }
}
function renderHistory(){
  var hist = el('history'); hist.innerHTML='';
  for (var i=0;i<STATE.asked.length;i++){
    var a = STATE.asked[i];
    var chip = document.createElement('span');
    chip.className = 'chip' + (a.optionKey==='omitida' ? ' omitida' : '');
    chip.textContent = (a.short || a.text) + ': ' + a.optionLabel;
    hist.appendChild(chip);
  }
}
function renderAnswers(){
  var rem = remainingHypotheses();
  var hash = hashAnswers(STATE.answers) + '\n' + (function(){ var s=[]; for (var i=0;i<rem.length;i++){ s.push(rem[i].id+':'+rem[i].score); } return s.join(','); })();
  if (hash === STATE.lastRenderHash) return;
  STATE.lastRenderHash = hash;
  var placeholder = el('answers-placeholder');
  var loading = el('loading');
  var answersWrap = el('answers');
  var solutionActions = el('solution-actions');
  answersWrap.innerHTML=''; if (solutionActions) solutionActions.style.display='none';
  if (rem.length > 4){
    if (placeholder){ placeholder.style.display='block'; placeholder.textContent='ainda não há respostas'; }
    if (loading) loading.style.display='none';
    return;
  }
  if (placeholder) placeholder.style.display='none';
  if (loading) loading.style.display='block';
  setTimeout(function(){
    if (loading) loading.style.display='none';
    if (rem.length===0){
      var card = document.createElement('div'); card.className='card';
      card.innerHTML =
        '<div class="row" style="justify-content:space-between">'
        + '<strong>Não há uma causa clara com a informação actual</strong>'
        + '<span class="status status-warning">Não conclusivo</span></div>'
        + '<div class="tips">Revê as respostas, continua ou reinicia o assistente.</div>';
      answersWrap.appendChild(card); return;
    }
    var maxScore = rem[0].score || 1;
    for (var i=0;i<rem.length;i++){
      var h = rem[i];
      var confident = isUniqueSolution() && i===0;
      var statusClass = confident ? 'status-final':'status-soft';
      var statusText = confident ? 'Resposta definitiva':'Ainda não conclusivo';
      var pct = Math.max(2, Math.round((h.score / maxScore) * 100));
      var card = document.createElement('div'); card.className='card';
      card.innerHTML =
        '<div class="row" style="justify-content:space-between">'
        + '<div><strong>'+h.name+'</strong><div class="small muted">Severidade: '+h.severity+'</div></div>'
        + '<span class="status '+statusClass+'">'+statusText+'</span>'
        + '</div>'
        + '<div class="bar" title="Confiança relativa"><div style="width:'+pct+'%;"></div></div>'
        + '<div class="tips"><strong>Passos sugeridos:</strong><ul style="margin:6px 0 0 18px">'
        + (function(){ var lis=[]; for (var k=0;k<h.fix.length;k++){ lis.push('<li>'+h.fix[k]+'</li>'); } return lis.join(''); })()
        + '</ul></div>';
      answersWrap.appendChild(card);
    }
    if (isUniqueSolution() && solutionActions){ solutionActions.style.display='flex'; }
  }, 400);
}
/*Interacção*/
function onAnswer(question, option){
  STATE.answers[question.id] = option.key;
  STATE.asked.push({ id:question.id, text:question.text, optionKey:option.key, optionLabel:option.label, short:shortLabel(question.id) });
  updateCandidatesScores();
  renderHistory();
  renderAnswers();
  renderQuestion();
  setProgress(Math.min(STATE.asked.length, STATE.maxQuestions), STATE.maxQuestions);
}
function shortLabel(qid){
  var map = {
    symptom_main:'Sintoma', ac_led:'LED de carga', ac_original:'Carregador', porta_carga_folga:'Porta de carga',
    funciona_com_bateria:'Sem tomada', bateria_inchada:'Bateria', power_led_fans:'LEDs/Ventoinha',
    beeps:'Bips', externo_imagem:'Monitor externo', brilho_baixo:'Ecrã ténue', mexe_tampa:'Ao mexer na tampa',
    congela:'Bloqueios', em_jogos:'Em jogos', temps_altas:'Temperaturas', recentes_alteracoes:'Alterações recentes',
    acesso_bios:'BIOS', loop_arranque:'Ciclo de arranque', ruidos_disco:'Ruídos do disco',
    usb_desconectar:'Periféricos USB', derrame:'Derrame', cheiro_queimado:'Cheiro a queimado',
    queda_golpe:'Queda/impacto', teclado_touchpad:'Teclado/Touchpad', wifi_camera:'Wi‑Fi/Câmara'
  };
  return map[qid] || qid;
}
/*Reinício e limites*/
function resetAssistant(){
  STATE.asked=[]; STATE.answers={}; STATE.unlimited=false; STATE.finished=false;
  STATE.candidates = (function(){ var arr=[]; for (var i=0;i<HYPOTHESES.length;i++){ var h=HYPOTHESES[i], c={}; for (var k in h) c[k]=h[k]; c.score=0; c.eliminated=false; arr.push(c);} return arr; })();
  STATE.lastRenderHash='';
  var limit = el('limit-actions'); if (limit) limit.style.display='none';
  var sol = el('solution-actions'); if (sol) sol.style.display='none';
  var ansWrap = el('answers'); if (ansWrap) ansWrap.innerHTML='';
  var ph = el('answers-placeholder'); if (ph){ ph.style.display='block'; ph.textContent='ainda não há respostas'; } 
  var load = el('loading'); if (load) load.style.display='none';
  var hist = el('history'); if (hist) hist.innerHTML='';
  setProgress(0, STATE.maxQuestions);
  updateHypCount();
  renderQuestion();
}
function continueUnlimited(){ STATE.unlimited=true; var limit = el('limit-actions'); if (limit) limit.style.display='none'; renderQuestion(); }
/*Ações pós-solução*/
function handleWorked(){
  var answersWrap = el('answers'); var card = document.createElement('div'); card.className='card';
  card.innerHTML = '<div class="row" style="justify-content:space-between"><strong>Excelente! Parece resolvido.</strong><span class="status status-final">Encerrado</span></div><div class="tips">Podes reiniciar o assistente para outro caso.</div>';
  if (answersWrap) answersWrap.insertBefore(card, answersWrap.firstChild);
  var sol = el('solution-actions'); if (sol) sol.style.display='none'; 
  STATE.finished=true;
}
function handleNotWorked(){
  var rem = remainingHypotheses(); if (rem.length){ rem[0].eliminated = true; }
  var sol = el('solution-actions'); if (sol) sol.style.display='none'; 
  renderAnswers(); renderQuestion(); updateHypCount();
}
/*Eventos*/
document.addEventListener('DOMContentLoaded', function(){
  var rb = el('reset-btn'); if (rb) rb.addEventListener('click', resetAssistant);
  var lrb = el('limit-reset-btn'); if (lrb) lrb.addEventListener('click', resetAssistant);
  var cb = el('continue-btn'); if (cb) cb.addEventListener('click', continueUnlimited);
  var srb = el('solution-reset-btn'); if (srb) srb.addEventListener('click', resetAssistant); 
  var wb = el('worked-btn'); if (wb) wb.addEventListener('click', handleWorked); 
  var nwb = el('not-worked-btn'); if (nwb) nwb.addEventListener('click', handleNotWorked);
  resetAssistant();
});
</script>
